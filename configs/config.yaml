app:
  name: gopay
  version: 1.0.0
  env: development
  debug: false

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  shutdown_timeout: 10s

database:
  host: localhost
  port: 5432
  user: gopay
  password: gopay123
  dbname: gopay
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

log:
  level: info
  format: json
  output: stdout
  file_path: ./logs/app.log
  max_size: 100
  max_backups: 5
  max_age: 30
  compress: true

payment:
  wechat:
    enabled: false
    mchid: ""
    serial_no: ""
    api_v3_key: ""
    private_key_path: ""
    public_key_path: ""
    public_key_id: ""
    notify_url: ""
  alipay:
    enabled: false
    appid: ""
    private_key_path: ""
    public_key_path: ""
    app_cert_path: ""
    root_cert_path: ""
    notify_url: ""
    is_prod: false
