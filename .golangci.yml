run:
  timeout: 5m
  go: '1.24'

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - prealloc
    - revive
    - unconvert

linters-settings:
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: indent-error-flow
  gosec:
    excludes:
      - G107
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: internal/pkg/apperror/codes.go
      linters:
        - misspell
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    - format: colored-line-number
